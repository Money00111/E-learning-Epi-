<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lesson Page</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">

    <!-- Lesson Title -->
    <h2 id="title">Loading...</h2>

    <!-- Lesson Content -->
    <div id="content">
      <p>Loading lesson...</p>
    </div>

  </div>

  <script>
    // =========================
    // 📖 GET LESSON FROM STORAGE
    // =========================
    const lesson = JSON.parse(localStorage.getItem("lesson"));

    const titleEl = document.getElementById("title");
    const contentEl = document.getElementById("content");

    // =========================
    // ❌ NO LESSON FOUND
    // =========================
    if (!lesson) {
      titleEl.innerText = "No lesson selected";
      contentEl.innerHTML = "<p>Hitamo isomo mbere.</p>";
    }

    // =========================
    // ✅ SHOW LESSON
    // =========================
    else {
      titleEl.innerText = lesson.title;
      contentEl.innerHTML = `<p>${lesson.content}</p>`;
    }
  </script>

</body>
  </html>
