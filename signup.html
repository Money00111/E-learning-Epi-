<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sign Up</title>

<style>
body{
background:#0f172a;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.box{
background:#1e293b;
padding:20px;
border-radius:15px;
width:90%;
max-width:350px;
}

h2{
color:white;
text-align:center;
}

input{
width:100%;
padding:12px;
margin:8px 0;
border:none;
border-radius:8px;
}

button{
width:100%;
padding:12px;
background:#38bdf8;
border:none;
border-radius:8px;
font-weight:bold;
}

p{
color:white;
text-align:center;
}

a{
color:#38bdf8;
}
</style>
</head>
<body>

<div class="box">
<h2>Create Account</h2>

<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">

<button onclick="signup()">Create Account</button>

<p>
Already have an account?
<a href="login.html">Login</a>
</p>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js";
import {
getAuth,
createUserWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.13.2/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyDVYmmWJHEiNtQCroj393lLEpgGaW_h0mM"
authDomain: "e-learning-epi.firebaseapp.com",
projectId: "e-learning-epi",
storageBucket: "e-learning-epi.firebasestorage.app",
messagingSenderId: "814946403235",
appId: "1:814946403235:web:2adfc123aa9751adcad016"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.signup = function(){

const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

createUserWithEmailAndPassword(auth,email,password)
.then(()=>{
alert("Account Created Successfully");
window.location.href="login.html";
})
.catch((error)=>{
alert(error.message);
});

}

</script>

</body>
</html>
