<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Teacher Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h2>👨‍🏫 Teacher Dashboard</h2>

<select id="level">
  <option>S1</option>
  <option>S2</option>
  <option>S3</option>
  <option>S4</option>
  <option>S5</option>
  <option>S6</option>
</select>

<br><br>

<input
  type="text"
  id="subject"
  placeholder="Subject">

<br><br>

<input
  type="text"
  id="topic"
  placeholder="Topic">

<br><br>

<input
  type="text"
  id="lessonTitle"
  placeholder="Lesson Title">

<br><br>

<input
  type="text"
  id="videoLink"
  placeholder="YouTube Embed Link">

<br><br>
  <input
  type="text"
  id="question"
  placeholder="Quiz Question">

<br><br>

<input
  type="text"
  id="optionA"
  placeholder="Option A">

<br><br>

<input
  type="text"
  id="optionB"
  placeholder="Option B">

<br><br>

<input
  type="text"
  id="optionC"
  placeholder="Option C">

<br><br>

<input
  type="text"
  id="correctAnswer"
  placeholder="Correct Answer">

<br><br>

<button onclick="saveLesson()">
Save Lesson
</button>

</div>

<script type="module" src="teacher.js"></script>

</body>
</html>
