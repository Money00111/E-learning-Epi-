<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - E-learning Epi</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:#1e293b;
padding:30px;
border-radius:15px;
width:90%;
max-width:350px;
}

h2{
color:white;
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin-bottom:15px;
border:none;
border-radius:8px;
outline:none;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#38bdf8;
font-weight:bold;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

p{
color:white;
text-align:center;
margin-top:15px;
}

a{
color:#38bdf8;
text-decoration:none;
}
</style>
</head>
<body>

<div class="container">
<h2>Login</h2>

<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

<p>
Don't have an account?
<a href="signup.html">Sign Up</a>
</p>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js";

import {
getAuth,
signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.13.2/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyDVYmmWJHEiNtQCroj393lLEpgGaW_h0mM"
authDomain: "e-learning-epi.firebaseapp.com",
projectId: "e-learning-epi",
storageBucket: "e-learning-epi.firebasestorage.app",
messagingSenderId: "814946403235",
appId: "1:814946403235:web:2adfc123aa9751adcad016"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.login = function(){

const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

signInWithEmailAndPassword(auth,email,password)
.then(()=>{
alert("Login Successful");
window.location.href="index.html";
})
.catch((error)=>{
alert(error.message);
});

}

</script>

</body>
  </html>
