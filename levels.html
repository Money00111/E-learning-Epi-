<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Select Level</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h2>📚 Hitamo Level yawe</h2>

    <div class="grid">

      <h3>Primary</h3>
      <div class="cards">
        <div class="card" onclick="selectLevel('Primary 1')">Primary 1</div>
        <div class="card" onclick="selectLevel('Primary 2')">Primary 2</div>
        <div class="card" onclick="selectLevel('Primary 3')">Primary 3</div>
        <div class="card" onclick="selectLevel('Primary 4')">Primary 4</div>
        <div class="card" onclick="selectLevel('Primary 5')">Primary 5</div>
        <div class="card" onclick="selectLevel('Primary 6')">Primary 6</div>
      </div>

      <h3>Secondary</h3>
      <div class="cards">
        <div class="card" onclick="selectLevel('S1')">S1</div>
        <div class="card" onclick="selectLevel('S2')">S2</div>
        <div class="card" onclick="selectLevel('S3')">S3</div>
        <div class="card" onclick="selectLevel('S4')">S4</div>
        <div class="card" onclick="selectLevel('S5')">S5</div>
        <div class="card" onclick="selectLevel('S6')">S6</div>
      </div>

      <h3>University</h3>
      <div class="cards">
        <div class="card" onclick="selectLevel('Year 1')">Year 1</div>
        <div class="card" onclick="selectLevel('Year 2')">Year 2</div>
        <div class="card" onclick="selectLevel('Year 3')">Year 3</div>
      </div>

    </div>
  </div>

  <script>
    function selectLevel(level) {
      localStorage.setItem("level", level);
      window.location.href = "subjects.html";
    }
  </script>

</body>
  </html>
